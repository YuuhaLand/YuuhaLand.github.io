<script type="text/javascript">

  function zenbu_yomikomi() {
	  for (const obj of adlist.addon_list) {
	  	let addon_list_div = document.getElementById('addon_list_div');
	  	let pack_flame = document.createElement('div')
	  	pack_flame.classList.add("pack_flame");
	  	addon_list_div.appendChild(pack_flame);
	  	pack_flame.innerHTML = `<img src="${obj.icon_url}" witdh=80 height=80><div class="text_content"><span class="pack_name"><a href="${obj.link}">${obj.name}</a></span><br>${obj.description}</div>`
	  }
  }
  zenbu_yomikomi()
</script>
