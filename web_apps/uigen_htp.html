<html lang="ja">

<head>
	<title>MCBE 文章UIジェネレーター - 優夢色</title>
	<link rel="stylesheet" type="text/css" href="../style.css">
	<link rel="icon" href="https://gotemba912.github.io/favicon.ico">
	<meta charset="utf-8" />
	<meta name="Description" content="マイクラのUIで文章を表示するUIを簡単に生成することが出来ます!" />
	<meta name="theme-color" content="#42ce6c" />
	<meta property="og:description" content="マイクラのUIで文章を表示するUIを簡単に生成することが出来ます!" />
	<meta property="og:site_name" content="ゆかやま" />
	<meta property="og:title" content="MCBE 文章UIジェネレーター - 優夢色" />
  <meta property="og:image" content="https://gotemba912.github.io/images/app_icon.png"/>
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive" />
</head>

<script type="text/javascript" src="uigen_htp.js"></script>

<body>
	<script type="text/javascript" src="../header.js"></script>
	<div id="main_content">
		<div style="height: 45px;"></div>
		<script type="text/javascript" src="../title.js"></script>
		<div class="contenten">
			<div class="pack_flame">
				<img src="../images/app_icon.png" witdh=80 height=80>
				<div class="text_content">
					<span class="pack_name">MCBE 文章UIジェネレーター</span><br>
					マイクラのUIで文章を表示するUIを簡単に生成することが出来ます!
				</div>
			</div>

			<p>文章を下に入力するか、コピペしてください。</p>
			<textarea id="honbun" style="width:100%; height:200px;"></textarea>
			<input type="button" onclick="convert();" value="変換" style="width:100%; height:30px;">
			<p>↓結果↓</p>

			<h3>
				<span id="correct"></span>
			</h3>

			<textarea id="result" style="width:100%; height:200px;" readonly></textarea>
			<input type="button" id="copy_btn" onclick="copy_to_clip();" value="コピーする" style="width:100%; height:30px;"
				disabled>

				<h2>使い方</h2>

			<p>行の最初に「<span style="font-family: monospace; font-size:large;">h></span>」を入れると、その行は見出しになります。<br>
				行の最初に「<span
					style="font-family: monospace; font-size:large;">i></span>」を入れ、その後にテクスチャのパスを入れると、画像が挿入できます。(ファイルの拡張子は不要です)</p>
			<p style="font-family: monospace; font-size:large;">例:<br>
				h>見出しです。<br>
				本文です。<br>
				i>textures/blocks/dirt</p>

			<div style="text-align:center;">
				<img src="images/uigen_htp.png" alt="生成後の例" title="生成後の例" style="max-width: 100%; height: auto;">
			</div>

      <div class="box22">
        <h2>変更履歴</h2>
      </div>

			2023/07/05 - stack_panelを生成しなくした。<br>
			2022/09/25 - リリース<br>
			<script type="text/javascript" src="../footer.js"></script>
		</div>
	</div>
	<div style="height: 35px;"></div>
</body>
<script>
  function convert() {
  	let honbun = document.getElementById("honbun").value
  	let resultbox = document.getElementById("result")
  	let copybtn = document.getElementById("copy_btn")
  	copybtn.value = "コピーする";
  
  	let resultpanel = "\n"
  
  	for (let i = 0; i < honbun.split('\n').length; i++) {
  		console.log(i)
  		let currentgyou = honbun.split(/\r\n|\r|\n/)[i].replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\t/g, '\\t')
  		if (i > 0) resultpanel = resultpanel + ',\n'
  		if (currentgyou.startsWith('h>')) {
  			resultpanel = resultpanel + `{ "howtoplay_${i.toString()}@how_to_play_common.header": {"$text": "${currentgyou.replace('h>', '')}"}}`
  			continue
  		}
  
  		if (currentgyou.startsWith('i>')) {
  			resultpanel = resultpanel + `{ "howtoplay_${i.toString()}@how_to_play_common.image": {"texture": "${currentgyou.replace('i>', '')}"}}`
  			continue
  		}
  
  		//HSPで作ってたときのやつと互換性を維持するためのやつ
  		if (currentgyou.startsWith('htp:h>')) {
  			resultpanel = resultpanel + `{ "howtoplay_${i.toString()}@how_to_play_common.header": {"$text": "${currentgyou.replace('htp:h>', '')}"}}`
  			continue
  		}
  
  		if (currentgyou.startsWith('htp:i>')) {
  			resultpanel = resultpanel + `{ "howtoplay_${i.toString()}@how_to_play_common.image": {"texture": "${currentgyou.replace('htp:i>', '')}"}}`
  			continue
  		}
  
  		resultpanel = resultpanel + `{ "howtoplay_${i.toString()}@how_to_play_common.paragraph": {"$text": "${currentgyou}"}}`
  	}
  	resultbox.value = resultpanel
  	copybtn.disabled = false;
  }
  
  function copy_to_clip() {
  	let resultbox = document.getElementById("result")
  	let copybtn = document.getElementById("copy_btn")
  	if (navigator.clipboard) {
  		navigator.clipboard.writeText(resultbox.value)
  		copybtn.value = "コピーしました!";
  	} else {
  		alert("大変申し訳ありませんが、お使いのブラウザはクリップボードにコピーに対応しておりません。\nResult欄から手動でコピーしてください。");
  	}
  }
</script>
</html>
