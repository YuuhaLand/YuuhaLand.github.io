<html lang="ja">

<head>
    <title>JSON エラーキャッチャー＆フォーマッター - 優夢色</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
    <link rel="icon" href="https://gotemba912.github.io/favicon.ico">
    <meta charset="utf-8" />
    <meta name="Description" content="JSONの構文ミスをチェックしたり整形して見栄えの良いJSONにすることができます!" />
    <meta name="theme-color" content="#42ce6c" />
    <meta property="og:description" content="JSONの構文ミスをチェックしたり整形して見栄えの良いJSONにすることができます!" />
    <meta property="og:site_name" content="ゆうはくおりてぃー" />
    <meta property="og:title" content="JSON エラーキャッチャー＆フォーマッター - 優夢色" />
    <meta property="og:image" content="https://gotemba912.github.io/images/app_icon.png"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow,noarchive" />
</head>

<script type="text/javascript" src="jsonlint.js"></script>

<body>
    <script type="text/javascript" src="../header.js"></script>
    <div id="main_content">
        <div style="height: 45px;"></div>
        <script type="text/javascript" src="../title.js"></script>
        <div class="contenten">
            <div class="pack_flame">
                <img src="../images/app_icon.png" witdh=80 height=80>
                <div class="text_content">
                    <span class="pack_name">JSON エラーキャッチャー＆フォーマッター</span><br>
                    JSONの構文ミスをチェックしたり整形して見栄えの良いJSONにすることができます!
                </div>
            </div>

            <p>JSONを入力、コピペ、またはアップロードしてください↓</p>

            <input type="file" id="upload_json" style="width:100%; height:30px;">
            <textarea id="json_file" style="width:100%; height:200px;"></textarea>
            <input type="button" onclick="format_json();" value="エラーキャッチ＆整形" style="width:100%; height:30px;">
            <form name="1line">
                <div>
                    <input type="checkbox" id="1line" name="1line" value="1line">
                    <label for="1line">JSONを一行にする</label>
                </div>
            </form>
            <p>↓結果↓</p>

            <h3>
                <span id="correct"></span>
            </h3>

            <textarea id="result" style="width:100%; height:200px;" readonly></textarea>
            <input type="button" id="copy_btn" onclick="copy_to_clip();" value="コピーする" style="width:100%; height:30px;"
                disabled>
            <input type="button" id="download_btn" onclick="download_file();" value="ダウンロード"
                style="width:100%; height:30px;" disabled>

                  <h2>変更履歴</h2>
    

            2021/11/19 - リリース<br>
            2022/09/21 - JSONパースエラーの内容を詳しく表示(<a href="https://github.com/circlecell/jsonlint-mod"
                target="_blank">https://github.com/circlecell/jsonlint-mod</a>)、 アップロード機能とダウンロード機能を追加<br>

            <script type="text/javascript" src="../footer.js"></script>
        </div>
    </div>
    <div style="height: 35px;"></div>
</body>

<script>
  window.onload = function() {
  	document.getElementById("upload_json").onchange = async (e) => {
  		let file = e.currentTarget.files[0]
  		if (!file) return
  
  		document.getElementById("json_file").value = await fetch_text(file)
  	}
  }
  
  let fetch_text = (file) => {
  	return new Promise((resolve) => {
  	  let fr = new FileReader()
  	  fr.onload = (e) => {
  		resolve(e.currentTarget.result)
  	  }
  	  fr.readAsText(file)
  	})
    }
  
  function format_json() {
  	let json_file = document.getElementById("json_file")
  	let resultbox = document.getElementById("result")
  	let iline = document.getElementById("1line")
  	let copybtn = document.getElementById("copy_btn")
  	let downloadbtn = document.getElementById("download_btn")
  	copybtn.value = "コピーする"
  	try{
  	    let obj2 = jsonlint.parse(json_file.value)
  		let error = "問題は検出されませんでした。"
  		let obj = JSON.parse(json_file.value)
  		document.getElementById("correct").textContent = error
  		if (iline.checked) {
  			resultbox.value = JSON.stringify(obj)
  		} else {
  			resultbox.value = JSON.stringify(obj, null, 2)
  		}
  		downloadbtn.disabled = false
  		copybtn.disabled = false
  	}
  	catch(e){
  		let error = "JSONの構文に問題があります!"
  		document.getElementById("correct").textContent = error
  		resultbox.value = e.message
  		downloadbtn.disabled = true
  		copybtn.disabled = true
  
  	}
  }
  
  function copy_to_clip() {
  	let resultbox = document.getElementById("result")
  	let copybtn = document.getElementById("copy_btn")
  	if (navigator.clipboard) {
  		navigator.clipboard.writeText(resultbox.value)
  		copybtn.value = "コピーしました!"
  	} else {
  		alert("大変申し訳ありませんが、お使いのブラウザはクリップボードにコピーに対応しておりません。\nResult欄から手動でコピーしてください。")
  	}
  }
  
  function download_file() {
  	let content = document.getElementById("result").value
  	let blob = new Blob([ content ], { "type": "text/plain" })
  	let link = document.createElement('a')
  	link.download = "format_json.json"
  	link.href = URL.createObjectURL(blob)
  	link.click()
  	URL.revokeObjectURL(link.href)
  }

</script>
</html>
